name: Container Keepalive (5min)

on:
  schedule:
    # 每 5 分钟执行一次（防止 15 分钟休眠）
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Container
        run: |
          echo "🔄 Keepalive started at $(date -u)"
          
          # 重试 3 次
          for i in 1 2 3; do
            echo "Attempt $i..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 30 \
              https://mokeycode.3200300.xyz/ 2>/dev/null || echo "000")
            
            echo "HTTP Status: $STATUS"
            
            # 403 也算通（Cloudflare 返回）
            if [ "$STATUS" = "403" ] || [ "$STATUS" = "404" ] || [ "$STATUS" = "200" ]; then
              echo "✅ Service is up!"
              exit 0
            fi
            
            sleep 10
          done
          
          echo "⚠️ All attempts failed"
