name: Keep Container Alive (10min)

on:
  schedule:
    # 每 10 分钟执行一次，防止 15 分钟休眠
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Service
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "⏰ Keepalive ping at $TIMESTAMP"
          
          # 访问主服务
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mokey.3200300.xyz 2>/dev/null || echo "000")
          echo "Main service: HTTP $STATUS"
          
          # 访问健康检查端点
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://mokey.3200300.xyz/health 2>/dev/null || echo "000")
          echo "Health check: HTTP $HEALTH"
          
          echo "✅ Ping completed"
