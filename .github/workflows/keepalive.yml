name: Keep Container Alive

on:
  schedule:
    # 每 10 分钟执行一次
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Container
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}\n" https://mokey.3200300.xyz || true
          echo "Keepalive at $(date -u)"
